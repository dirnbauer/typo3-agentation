<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:be.pageRenderer includeJavaScriptModules="{
    0: '@webconsulting/agentation/module.js'
}"
                   includeCssFiles="{
    0: 'EXT:agentation/Resources/Public/Css/Module.css'
}" />

<div class="module-body">

    <div class="callout callout-info mb-4">
        <div class="callout-body">
            <strong>
                <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.intro.title" />
            </strong>
            <p class="mb-0">
                <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.intro.text"
                             arguments="{count: stepCount}" />
            </p>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">

            <div class="card mb-4">
                <div class="card-header">
                    <h2 class="card-title mb-0">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.heading" />
                    </h2>
                </div>
                <div class="card-body">
                    <p class="text-body-secondary">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.intro" />
                    </p>

                    <f:if condition="!{apiKeyConfigured}">
                        <div class="callout callout-warning">
                            <div class="callout-body">
                                <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.noApiKey" />
                            </div>
                        </div>
                    </f:if>

                    <div class="mb-3">
                        <label class="form-label" for="agentation-mcp-json">
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.label" />
                        </label>
                        <textarea id="agentation-mcp-json"
                                  class="form-control font-monospace"
                                  rows="12"
                                  readonly
                                  spellcheck="false"
                                  aria-describedby="agentation-mcp-hint">{mcpJson}</textarea>
                        <small id="agentation-mcp-hint" class="form-text text-body-secondary">
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.hint" />
                        </small>
                    </div>

                    <div class="agentation-actions">
                        <a class="btn btn-primary"
                           href="{cursorDeepLink}"
                           target="_top">
                            <typo3-backend-icon identifier="actions-plus" size="small"></typo3-backend-icon>
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.addToCursor" />
                        </a>
                        <button type="button"
                                class="btn btn-default"
                                data-agentation-copy="#agentation-mcp-json">
                            <typo3-backend-icon identifier="actions-clipboard" size="small"></typo3-backend-icon>
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.copy" />
                        </button>
                        <a class="btn btn-default"
                           href="{mcpDocsUrl}"
                           target="_blank"
                           rel="noopener noreferrer">
                            <typo3-backend-icon identifier="actions-external-link" size="small"></typo3-backend-icon>
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.docs" />
                        </a>
                    </div>

                    <div class="mt-4">
                        <label class="form-label" for="agentation-claude-cli">
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.claudeCliLabel" />
                        </label>
                        <div class="input-group">
                            <input id="agentation-claude-cli"
                                   type="text"
                                   class="form-control font-monospace"
                                   readonly
                                   value="{claudeCodeCli}"
                                   aria-describedby="agentation-claude-cli-hint">
                            <button type="button"
                                    class="btn btn-default"
                                    data-agentation-copy="#agentation-claude-cli"
                                    title="{f:translate(key: 'LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.copy')}">
                                <typo3-backend-icon identifier="actions-clipboard" size="small"></typo3-backend-icon>
                            </button>
                        </div>
                        <small id="agentation-claude-cli-hint" class="form-text text-body-secondary">
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.mcp.claudeCliHint" />
                        </small>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h2 class="card-title mb-0">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.annotations.heading" />
                    </h2>
                </div>
                <div class="card-body">
                    <p class="text-body-secondary mb-3">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.annotations.intro" />
                    </p>
                    <div class="d-flex flex-wrap align-items-center gap-2">
                        <span class="badge bg-secondary" data-agentation-counter>
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.annotations.loading" />
                        </span>
                        <button type="button"
                                class="btn btn-danger"
                                data-agentation-delete-all
                                disabled>
                            <typo3-backend-icon identifier="actions-delete" size="small"></typo3-backend-icon>
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.annotations.deleteAll" />
                        </button>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h2 class="card-title mb-0">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.heading" />
                    </h2>
                </div>
                <div class="card-body">
                    <p class="text-body-secondary mb-3">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.summary"
                                     arguments="{count: stepCount}" />
                    </p>

                    <details class="agentation-details">
                        <summary>
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.toggleShow" />
                        </summary>
                        <div class="mt-3">
                            <ol class="mb-3">
                                <li><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.step1" /></li>
                                <li><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.step2" /></li>
                                <li><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.step3" /></li>
                                <li><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.step4" /></li>
                            </ol>
                            <p class="mb-0">
                                <a href="{mcpDocsUrl}" target="_blank" rel="noopener noreferrer">
                                    <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.howto.readDocs" />
                                    &nbsp;&rarr;
                                </a>
                            </p>
                        </div>
                    </details>
                </div>
            </div>

        </div>

        <div class="col-lg-4">
            <div class="card mb-4">
                <div class="card-header">
                    <h2 class="card-title mb-0">
                        <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.heading" />
                    </h2>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.apiKey" /></span>
                        <f:if condition="{apiKeyConfigured}">
                            <f:then><span class="badge bg-success"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.set" /></span></f:then>
                            <f:else><span class="badge bg-warning"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.missing" /></span></f:else>
                        </f:if>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.bundle" /></span>
                        <f:if condition="{bundleBuilt}">
                            <f:then><span class="badge bg-success"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.built" /></span></f:then>
                            <f:else><span class="badge bg-danger"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.notBuilt" /></span></f:else>
                        </f:if>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.context" /></span>
                        <f:if condition="{contextAllowed}">
                            <f:then><span class="badge bg-success"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.allowed" /></span></f:then>
                            <f:else><span class="badge bg-secondary"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.blocked" /></span></f:else>
                        </f:if>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.frontend" /></span>
                        <f:if condition="{frontendEnabled}">
                            <f:then><span class="badge bg-success"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.on" /></span></f:then>
                            <f:else><span class="badge bg-secondary"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.off" /></span></f:else>
                        </f:if>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.backend" /></span>
                        <f:if condition="{backendEnabled}">
                            <f:then><span class="badge bg-success"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.on" /></span></f:then>
                            <f:else><span class="badge bg-secondary"><f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.off" /></span></f:else>
                        </f:if>
                    </li>
                    <li class="list-group-item">
                        <small class="text-body-secondary d-block mb-1">
                            <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.status.workspace" />
                        </small>
                        <code>{workspaceId -> f:or(alternative: '—')}</code>
                    </li>
                </ul>
            </div>

            <a class="btn btn-default w-100" href="https://www.agentation.com/" target="_blank" rel="noopener noreferrer">
                <f:translate key="LLL:EXT:agentation/Resources/Private/Language/locallang_mod.xlf:module.links.site" />
            </a>
        </div>
    </div>

</div>

</html>
